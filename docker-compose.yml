version: '3.8'

services:
  backend:
    build:
      context: ./g2p
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODEL_PATH=/app/g2p_model.pt
      - VOCAB_PATH=/app/g2p_vocab.json
    restart: unless-stopped

  frontend:
    build:
      context: ./traductor-ipa
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
